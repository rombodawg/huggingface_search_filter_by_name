<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>HF Hub Filter</title>
  <style>
    * { box-sizing: border-box; }
    body {
      width: 320px;
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #111827;
      color: #f3f4f6;
    }
    header {
      padding: 14px 16px 10px;
      border-bottom: 1px solid #1f2937;
    }
    header h1 {
      font-size: 14px;
      margin: 0 0 2px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    header p {
      margin: 0;
      font-size: 11px;
      color: #9ca3af;
    }
    .panel {
      padding: 12px 16px;
    }
    .add-form {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 14px;
    }
    .row {
      display: flex;
      gap: 6px;
    }
    select, input[type="text"] {
      background: #1f2937;
      border: 1px solid #374151;
      color: #f3f4f6;
      border-radius: 6px;
      padding: 7px 8px;
      font-size: 12px;
    }
    select {
      flex: 0 0 90px;
    }
    input[type="text"] {
      flex: 1;
      min-width: 0;
    }
    button {
      cursor: pointer;
      border: none;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 600;
      padding: 7px 10px;
    }
    .btn-add {
      background: #ff9d00;
      color: #1f2937;
      width: 100%;
    }
    .btn-add:hover {
      background: #ffb733;
    }
    .btn-add:disabled {
      opacity: 0.5;
      cursor: default;
    }
    .section-label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: #9ca3af;
      margin: 4px 0 8px;
    }
    ul#rule-list {
      list-style: none;
      margin: 0;
      padding: 0;
      max-height: 220px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .rule-item {
      display: flex;
      align-items: center;
      gap: 8px;
      background: #1f2937;
      border-radius: 6px;
      padding: 6px 8px;
    }
    .rule-tag {
      font-size: 10px;
      text-transform: uppercase;
      padding: 2px 6px;
      border-radius: 999px;
      font-weight: 700;
      flex: 0 0 auto;
    }
    .rule-tag--author {
      background: #312e81;
      color: #c7d2fe;
    }
    .rule-tag--name {
      background: #422006;
      color: #fdba74;
    }
    .rule-value {
      flex: 1;
      font-size: 12px;
      word-break: break-all;
    }
    .rule-remove {
      flex: 0 0 auto;
      background: transparent;
      color: #9ca3af;
      font-size: 14px;
      line-height: 1;
      padding: 2px 6px;
    }
    .rule-remove:hover {
      color: #ef4444;
    }
    .empty-state {
      font-size: 12px;
      color: #6b7280;
      text-align: center;
      padding: 16px 8px;
    }
    footer {
      padding: 10px 16px;
      border-top: 1px solid #1f2937;
      font-size: 10.5px;
      color: #6b7280;
    }
  </style>
</head>
<body>
  <header>
    <h1>🛡️ HF Hub Filter</h1>
    <p>Hide models, datasets &amp; spaces by author or name on huggingface.co</p>
  </header>

  <div class="panel">
    <div class="add-form">
      <div class="row">
        <select id="rule-type">
          <option value="author">Author</option>
          <option value="name">Name</option>
        </select>
        <input id="rule-value" type="text" placeholder="e.g. lordx64" autocomplete="off" />
      </div>
      <button id="add-btn" class="btn-add" disabled>Add filter</button>
    </div>

    <div class="section-label">Active filters</div>
    <ul id="rule-list"></ul>
    <div id="empty-state" class="empty-state" style="display:none;">
      No filters yet — add a username or model name keyword above.
    </div>
  </div>

  <footer>
    Filtered results on huggingface.co/models, /datasets and /spaces are backfilled so the page still shows a full set.
  </footer>

  <script src="filters.js"></script>
  <script src="popup.js"></script>
</body>
</html>
